<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#060610"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="300" r="250" fill="url(#glow)"/>

  <!-- Timeline dots -->
  <circle cx="280" cy="360" r="8" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="440" cy="360" r="8" fill="#00ff8c" opacity="0.8"/>
  <circle cx="600" cy="360" r="8" fill="#00d4ff" opacity="0.8"/>
  <circle cx="760" cy="360" r="8" fill="#ffd700" opacity="0.8"/>
  <!-- Timeline line -->
  <line x1="288" y1="360" x2="752" y2="360" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- Year labels -->
  <text x="280" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff6b6b" opacity="0.6">2023</text>
  <text x="440" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#00ff8c" opacity="0.6">2024</text>
  <text x="600" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4ff" opacity="0.6">2024</text>
  <text x="760" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffd700" opacity="0.6">2026</text>

  <!-- Paper short names -->
  <text x="280" y="412" text-anchor="middle" font-family="monospace" font-size="9" fill="#e0e8f0" opacity="0.35">Hubble</text>
  <text x="440" y="412" text-anchor="middle" font-family="monospace" font-size="9" fill="#e0e8f0" opacity="0.35">Algebra</text>
  <text x="600" y="412" text-anchor="middle" font-family="monospace" font-size="9" fill="#e0e8f0" opacity="0.35">Universe</text>
  <text x="760" y="412" text-anchor="middle" font-family="monospace" font-size="9" fill="#e0e8f0" opacity="0.35">Higgs</text>

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="300" fill="#e0e8f0">
