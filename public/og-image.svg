<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#060610"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="200" fill="url(#glow)"/>

  <!-- Black hole -->
  <circle cx="600" cy="315" r="60" fill="#000" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Accretion ring -->
  <ellipse cx="600" cy="315" rx="140" ry="50" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <ellipse cx="600" cy="315" rx="100" ry="36" fill="none" stroke="#ffd700" stroke-width="0.8" opacity="0.2"/>
  <!-- Core glow -->
  <circle cx="600" cy="315" r="8" fill="#ffd700" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="300" fill="#e0e8f0">
    Emergent Higgs Field
  </text>
  <text x="600" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="300" fill="#00d4ff">
    &amp; the Schwarzschild Black Hole
  </text>

  <!-- Subtitle -->
  <text x="600" y="240" text-anchor="middle" font-family="monospace" font-size="13" fill="#00d4ff" opacity="0.5" letter-spacing="3">
    INTERACTIVE PAPER COMPANION
  </text>

  <!-- Key result -->
  <text x="600" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#ffd700" opacity="0.7">
    The quartic coupling λ → λ/5 at the potential minima
  </text>

  <!-- Author -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="12" fill="#e0e8f0" opacity="0.3">
    Dragana Pilipović · Particles 2026, 9(2), 37
  </text>
</svg>
